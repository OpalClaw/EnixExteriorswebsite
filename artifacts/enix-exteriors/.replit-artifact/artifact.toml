kind = "web"
previewPath = "/"
title = "Enix Exteriors - Multi-Page Site"
version = "1.0.0"
id = "artifacts/enix-exteriors"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24682

[services.development]
run = "pnpm --filter @workspace/enix-exteriors run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/enix-exteriors", "run", "build" ]
publicDir = "artifacts/enix-exteriors/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24682"
BASE_PATH = "/"
